<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Board - Student Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="dashboard" id="dashboard">
        <!-- Header -->
        <div class="dashboard-header">
            <div>
                <h1 class="header-title" id="dashboardTitle">
                    STUDENT DASHBOARD
                   
                </h1>
            </div>
            <div class="user-info">
                <div class="user-details">
                    <div id="userName">User Name</div>
                    <div class="user-role" id="userRole">Student</div>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <!-- Content -->
        <div class="dashboard-content">
            <div class="board-container">
                <!-- Display Content Section -->
                <div class="board-section">
                    <div class="board-title" id="boardTitle"><i class="bi bi-journal-check"></i>Student Board</div>
                    <div class="content-grid" id="contentGrid">
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>No content yet. Check back later!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
 <div class="footer">
        <p>&copy;2026 Smart Learning. All rights reserved.</p>
        <p>website created by<span> Gurusaran B</span></p>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
