<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Board - Parent Upload</title>
    <link rel="stylesheet" href="css/upload.css">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="dashboard" id="dashboard">
        <!-- Header -->
        <div class="dashboard-header">
            <div>
                <h1 class="header-title" id="dashboardTitle">PARENT
                    BOARD
                </h1>
            </div>
            <div class="user-info">
                <div class="user-details">
                    <div id="userName">User Name</div>
                    <div class="user-role" id="userRole">Parent</div>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>

        <!-- Content -->
        <div class="dashboard-content">
            <div class="board-container">
                <!-- Parent Upload Section -->
                <div class="board-section" id="parentSection">
                    <div class="board-title"><i class="bi bi-share"></i>Share Content</div>
                    <div class="input-form">
                        <div class="form-group-full">
                            <label for="textInput">Message or Description</label>
                            <textarea id="textInput" placeholder="Write a message for students..."></textarea>
                        </div>

                        <div class="form-group-full">
                            <label for="youtubeLink">YouTube Video Link (Optional)</label>
                            <input type="url" id="youtubeLink" placeholder="Paste YouTube link (e.g., https://www.youtube.com/watch?v=...)">
                        </div>

                        <div class="button-group">
                            <button class="submit-btn" id="submitBtn">Share Content</button>
                            <button class="clear-btn" id="clearBtn">Clear</button>
                        </div>
                    </div>
                </div>

                <!-- Display Content Section -->
                <div class="board-section">
                    <div class="board-title" id="boardTitle">  <i class="bi bi-file-play"></i> Shared Content</div>
                    <div class="content-grid" id="contentGrid">
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>No content shared yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
     
    <script src="js/script.js"></script>
    
</body>
</html>
